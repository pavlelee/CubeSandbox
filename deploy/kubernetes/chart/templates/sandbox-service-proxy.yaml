{{- if and .Values.cubeNode.sandboxServiceProxies .Values.cubeNode.sandboxServiceProxy.dedicated.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cube.fullname" . }}-sandbox-service-proxy
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox-service-proxy
spec:
  replicas: {{ .Values.cubeNode.sandboxServiceProxy.dedicated.replicas }}
  selector:
    matchLabels:
      {{- include "cube.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sandbox-service-proxy
  template:
    metadata:
      labels:
        {{- include "cube.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: sandbox-service-proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.cubeNode.sandboxServiceProxy.dedicated.nodeName }}
      nodeName: {{ .Values.cubeNode.sandboxServiceProxy.dedicated.nodeName | quote }}
      {{- end }}
      {{- with .Values.cubeNode.sandboxServiceProxy.dedicated.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.cubeNode.sandboxServiceProxy.dedicated.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- if .Values.cubeNode.sandboxServiceProxy.dedicated.dns.enabled }}
        - name: dns
          image: {{ include "cube.image" .Values.images.coredns | quote }}
          imagePullPolicy: {{ .Values.images.coredns.pullPolicy }}
          args:
            - -conf
            - /etc/coredns/Corefile
          env:
            {{- include "cube.timezoneEnv" . | nindent 12 }}
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          volumeMounts:
            - name: coredns-config
              mountPath: /etc/coredns
              readOnly: true
        {{- end }}
        - name: proxy
          image: {{ include "cube.image" .Values.images.cubeEgress | quote }}
          imagePullPolicy: {{ .Values.images.cubeEgress.pullPolicy }}
          command:
            - /bin/bash
            - -ec
            - |
              mkdir -p /tmp/sandbox-service-proxy/conf /tmp/sandbox-service-proxy/logs
              cat > /tmp/sandbox-service-proxy/conf/nginx.conf <<'NGINX'
              worker_processes 1;
              error_log /dev/stderr info;
              pid /tmp/sandbox-service-proxy/nginx.pid;
              events {
                  worker_connections 1024;
              }
              http {
                  access_log /dev/stdout;
                  proxy_connect_timeout 5s;
                  proxy_send_timeout 60s;
                  proxy_read_timeout 60s;
                  {{- range $i, $proxy := .Values.cubeNode.sandboxServiceProxies }}
                  server {
                      listen 0.0.0.0:{{ .listenPort }};
                      {{- if .upstreamResolver }}
                      resolver {{ .upstreamResolver }} valid=30s ipv6=off;
                      set $sandbox_proxy_upstream_{{ $i }} "{{ .upstreamHost }}:{{ .upstreamPort }}";
                      {{- end }}
                      location / {
                          proxy_http_version 1.1;
                          proxy_set_header Host {{ default .upstreamHost .upstreamHostHeader | quote }};
                          proxy_set_header X-Forwarded-For "";
                          proxy_set_header X-Real-IP "";
                          proxy_set_header Forwarded "";
                          {{- if .upstreamResolver }}
                          proxy_pass http://$sandbox_proxy_upstream_{{ $i }};
                          {{- else }}
                          proxy_pass http://{{ .upstreamHost }}:{{ .upstreamPort }};
                          {{- end }}
                      }
                  }
                  {{- end }}
              }
              NGINX
              exec /usr/local/openresty/nginx/sbin/nginx -p /tmp/sandbox-service-proxy -c conf/nginx.conf -g 'daemon off;'
          securityContext:
            privileged: {{ .Values.security.privileged }}
            capabilities:
              add:
                - NET_BIND_SERVICE
          env:
            {{- include "cube.timezoneEnv" . | nindent 12 }}
          {{- with .Values.cubeNode.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.cubeNode.sandboxServiceProxy.dedicated.dns.enabled }}
      volumes:
        - name: coredns-config
          configMap:
            name: {{ include "cube.fullname" . }}-dns-config
      {{- end }}
{{- end }}

{{- if .Values.cubeDns.enabled }}
{{- $domain := default .Values.cubeProxy.domain .Values.cubeDns.domain -}}
{{- $domainRegex := replace "." "\\." $domain -}}
{{- $forward := "/etc/resolv.conf" -}}
{{- $answerIP := default .Values.cubeProxy.advertiseIP .Values.cubeDns.answerIP -}}
{{- if .Values.cubeDns.forward.upstreams -}}
{{- $forward = join " " .Values.cubeDns.forward.upstreams -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cube.fullname" . }}-dns-config
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: dns
data:
  Corefile: |-
    .:53 {
        {{- if eq .Values.cubeDns.mode "nodeLocal" }}
        bind {{ .Values.cubeDns.bindAddress }}{{- if .Values.cubeDns.sandboxGateway.enabled }} {$NODE_IP}{{- end }}
        {{- end }}
        {{- if $answerIP }}
        template IN A {{ $domain }} {
            answer "{{ "{{" }} .Name {{ "}}" }} 60 IN A {{ $answerIP }}"
        }
        template IN A (.*)\.{{ $domainRegex }} {
            answer "{{ "{{" }} .Name {{ "}}" }} 60 IN A {{ $answerIP }}"
        }
        {{- else if eq .Values.cubeDns.mode "nodeLocal" }}
        template IN A {{ $domain }} {
            answer "{{ "{{" }} .Name {{ "}}" }} 60 IN A {$NODE_IP}"
        }
        template IN A (.*)\.{{ $domainRegex }} {
            answer "{{ "{{" }} .Name {{ "}}" }} 60 IN A {$NODE_IP}"
        }
        {{- end }}
        template IN AAAA {{ $domain }} {
            rcode NOERROR
        }
        template IN AAAA (.*)\.{{ $domainRegex }} {
            rcode NOERROR
        }
        log
        cache 300
        forward . {{ $forward }}
    }
{{- if eq .Values.cubeDns.mode "nodeLocal" }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "cube.fullname" . }}-dns
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: dns
spec:
  selector:
    matchLabels:
      {{- include "cube.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dns
  template:
    metadata:
      labels:
        {{- include "cube.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dns
      annotations:
        checksum/corefile: {{ printf "%s|%s|%s|%s|%s|%t|node-local-v3" $domain $answerIP .Values.cubeDns.bindAddress .Values.cubeDns.mode $forward .Values.cubeDns.sandboxGateway.enabled | sha256sum | quote }}
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "cube.computePlacement" . | nindent 6 }}
      containers:
        - name: coredns
          image: {{ include "cube.image" .Values.images.coredns | quote }}
          imagePullPolicy: {{ .Values.images.coredns.pullPolicy }}
          args:
            - -conf
            - /etc/coredns/Corefile
          env:
            {{- include "cube.timezoneEnv" . | nindent 12 }}
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          readinessProbe:
            tcpSocket:
              host: {{ .Values.cubeDns.bindAddress | quote }}
              port: dns-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              host: {{ .Values.cubeDns.bindAddress | quote }}
              port: dns-tcp
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6
          volumeMounts:
            - name: coredns-config
              mountPath: /etc/coredns
              readOnly: true
          {{- with .Values.cubeDns.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: coredns-config
          configMap:
            name: {{ include "cube.fullname" . }}-dns-config
{{- else }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cube.fullname" . }}-dns
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: dns
spec:
  replicas: {{ .Values.cubeDns.replicas }}
  selector:
    matchLabels:
      {{- include "cube.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dns
  template:
    metadata:
      labels:
        {{- include "cube.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dns
      annotations:
        checksum/corefile: {{ printf "%s|%s|%s|service-v1" $domain .Values.cubeDns.answerIP $forward | sha256sum | quote }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "cube.computePlacement" . | nindent 6 }}
      containers:
        - name: coredns
          image: {{ include "cube.image" .Values.images.coredns | quote }}
          imagePullPolicy: {{ .Values.images.coredns.pullPolicy }}
          args:
            - -conf
            - /etc/coredns/Corefile
          {{- if .Values.global.timezone }}
          env:
            {{- include "cube.timezoneEnv" . | nindent 12 }}
          {{- end }}
          ports:
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 6
          volumeMounts:
            - name: coredns-config
              mountPath: /etc/coredns
              readOnly: true
          {{- with .Values.cubeDns.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: coredns-config
          configMap:
            name: {{ include "cube.fullname" . }}-dns-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cube.fullname" . }}-dns
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: dns
  {{- with .Values.cubeDns.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.cubeDns.service.type }}
  selector:
    {{- include "cube.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dns
  ports:
    - name: dns-udp
      protocol: UDP
      port: {{ .Values.cubeDns.service.port }}
      targetPort: dns-udp
    - name: dns-tcp
      protocol: TCP
      port: {{ .Values.cubeDns.service.port }}
      targetPort: dns-tcp
{{- end }}
{{- end }}

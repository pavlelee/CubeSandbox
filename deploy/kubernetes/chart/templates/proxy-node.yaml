{{- if eq (include "cube.proxyEnabled" .) "true" }}
{{- $redisHost := default (include "cube.redisHost" .) .Values.cubeProxy.redis.host -}}
{{- $redisPort := default .Values.redis.port .Values.cubeProxy.redis.port -}}
{{- $proxyCertSecretName := include "cube.proxyCertSecretName" . -}}
{{- if eq .Values.cubeProxy.tls.mode "inline" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $proxyCertSecretName }}
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: cube-proxy-node
type: Opaque
stringData:
  {{ .Values.cubeProxy.tls.certSecretKey | quote }}: |-
{{ .Values.cubeProxy.tls.cert | nindent 4 }}
  {{ .Values.cubeProxy.tls.keySecretKey | quote }}: |-
{{ .Values.cubeProxy.tls.key | nindent 4 }}
---
{{- else if eq .Values.cubeProxy.tls.mode "selfSigned" }}
{{- $commonName := default .Values.cubeProxy.domain .Values.cubeProxy.tls.selfSigned.commonName -}}
{{- $dnsNames := list .Values.cubeProxy.domain -}}
{{- range .Values.cubeProxy.tls.selfSigned.dnsNames }}
{{- $dnsNames = append $dnsNames . -}}
{{- end }}
{{- $dnsNames = uniq $dnsNames -}}
{{- $ipAddresses := list -}}
{{- range .Values.cubeProxy.tls.selfSigned.ipAddresses }}
{{- $ipAddresses = append $ipAddresses . -}}
{{- end }}
{{- $certKey := .Values.cubeProxy.tls.certSecretKey -}}
{{- $keyKey := .Values.cubeProxy.tls.keySecretKey -}}
{{- $caKey := .Values.cubeProxy.tls.caSecretKey -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $proxyCertSecretName -}}
{{- $hasExisting := and $existing (hasKey $existing.data $certKey) (hasKey $existing.data $keyKey) (hasKey $existing.data $caKey) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $proxyCertSecretName }}
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: cube-proxy-node
type: Opaque
{{ if $hasExisting }}
data:
  {{ $certKey | quote }}: {{ index $existing.data $certKey | quote }}
  {{ $keyKey | quote }}: {{ index $existing.data $keyKey | quote }}
  {{ $caKey | quote }}: {{ index $existing.data $caKey | quote }}
{{- else }}
{{- $ca := genCA (printf "%s-proxy-ca" (include "cube.fullname" .)) (int .Values.cubeProxy.tls.selfSigned.caValidityDays) -}}
{{- $cert := genSignedCert $commonName $ipAddresses $dnsNames (int .Values.cubeProxy.tls.selfSigned.certValidityDays) $ca -}}
stringData:
  {{ .Values.cubeProxy.tls.certSecretKey | quote }}: |-
{{ $cert.Cert | nindent 4 }}
  {{ .Values.cubeProxy.tls.keySecretKey | quote }}: |-
{{ $cert.Key | nindent 4 }}
  {{ .Values.cubeProxy.tls.caSecretKey | quote }}: |-
{{ $ca.Cert | nindent 4 }}
{{- end }}
---
{{- else if eq .Values.cubeProxy.tls.mode "certManager" }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $proxyCertSecretName }}
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: cube-proxy-node
spec:
  secretName: {{ $proxyCertSecretName }}
  {{- if .Values.cubeProxy.tls.certManager.commonName }}
  commonName: {{ .Values.cubeProxy.tls.certManager.commonName | quote }}
  {{- else }}
  commonName: {{ .Values.cubeProxy.domain | quote }}
  {{- end }}
  dnsNames:
    {{- if .Values.cubeProxy.tls.certManager.dnsNames }}
    {{- toYaml .Values.cubeProxy.tls.certManager.dnsNames | nindent 4 }}
    {{- else }}
    - {{ .Values.cubeProxy.domain | quote }}
    {{- end }}
  {{- with .Values.cubeProxy.tls.certManager.ipAddresses }}
  ipAddresses:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.cubeProxy.tls.certManager.duration }}
  duration: {{ . | quote }}
  {{- end }}
  {{- with .Values.cubeProxy.tls.certManager.renewBefore }}
  renewBefore: {{ . | quote }}
  {{- end }}
  usages:
    {{- toYaml .Values.cubeProxy.tls.certManager.usages | nindent 4 }}
  issuerRef:
    group: {{ .Values.cubeProxy.tls.certManager.issuerRef.group | quote }}
    kind: {{ .Values.cubeProxy.tls.certManager.issuerRef.kind | quote }}
    name: {{ .Values.cubeProxy.tls.certManager.issuerRef.name | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "cube.proxyName" . }}
  labels:
    {{- include "cube.labels" . | nindent 4 }}
    app.kubernetes.io/component: cube-proxy-node
spec:
  updateStrategy:
    {{- toYaml .Values.cubeProxy.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "cube.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cube-proxy-node
  template:
    metadata:
      labels:
        {{- include "cube.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cube-proxy-node
      {{- with .Values.cubeProxy.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      automountServiceAccountToken: false
      hostNetwork: {{ .Values.cubeProxy.hostNetwork }}
      dnsPolicy: {{ ternary "ClusterFirstWithHostNet" "ClusterFirst" .Values.cubeProxy.hostNetwork }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "cube.computePlacement" . | nindent 6 }}
      containers:
        - name: cube-proxy-node
          image: {{ include "cube.image" .Values.images.proxyNode | quote }}
          imagePullPolicy: {{ .Values.images.proxyNode.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              set -u
              mkdir -p /usr/local/openresty/nginx/conf/global /data /data/log/cube-proxy /cache

              case "${CUBE_PROXY_HTTP_LISTEN_PORT}:${CUBE_PROXY_HTTPS_LISTEN_PORT}" in
                *[!0-9:]*|:*|*:)
                  echo "invalid CubeProxy listen ports: http=${CUBE_PROXY_HTTP_LISTEN_PORT} https=${CUBE_PROXY_HTTPS_LISTEN_PORT}" >&2
                  exit 1
                  ;;
              esac
              sed -i \
                -e "s/listen 8081 reuseport;/listen ${CUBE_PROXY_HTTP_LISTEN_PORT} reuseport;/g" \
                -e "s/listen 8080 ssl reuseport;/listen ${CUBE_PROXY_HTTPS_LISTEN_PORT} ssl reuseport;/g" \
                -e "s/set \\\$host_proxy_port 8081;/set \\\$host_proxy_port ${CUBE_PROXY_HTTP_LISTEN_PORT};/g" \
                -e "s/set \\\$host_proxy_port 8080;/set \\\$host_proxy_port ${CUBE_PROXY_HTTPS_LISTEN_PORT};/g" \
                /usr/local/openresty/nginx/conf/nginx.conf

              escape_nginx_value() {
                printf '%s' "$1" | sed 's/[\\"]/\\&/g'
              }

              resolver_addrs="${CUBE_PROXY_RESOLVER_ADDRS:-}"
              if [ -z "${resolver_addrs}" ]; then
                resolver_addrs="$(awk '/^nameserver[[:space:]]+/ { printf "%s ", $2 }' /etc/resolv.conf | sed 's/[[:space:]]*$//')"
              fi
              [ -n "${resolver_addrs}" ] || {
                echo "unable to determine nginx DNS resolver for CubeProxy Redis lookups" >&2
                exit 1
              }
              case "${resolver_addrs}${CUBE_PROXY_RESOLVER_VALID}${CUBE_PROXY_RESOLVER_TIMEOUT}${CUBE_PROXY_RESOLVER_IPV6}" in
                *[\;\{\}\$\`]*)
                  echo "invalid CubeProxy resolver configuration" >&2
                  exit 1
                  ;;
              esac

              cat > /usr/local/openresty/nginx/conf/global/global.conf <<EOF
              resolver ${resolver_addrs} valid=${CUBE_PROXY_RESOLVER_VALID} ipv6=${CUBE_PROXY_RESOLVER_IPV6};
              resolver_timeout ${CUBE_PROXY_RESOLVER_TIMEOUT};
              set \$redis_ip "$(escape_nginx_value "${REDIS_HOST}")";
              set \$redis_port "$(escape_nginx_value "${REDIS_PORT}")";
              set \$redis_pd "$(escape_nginx_value "${REDIS_PASSWORD}")";
              set \$redis_index "$(escape_nginx_value "${REDIS_DB}")";
              set \$timeout_min "$(escape_nginx_value "${TIMEOUT_MIN}")";
              set \$timeout_max "$(escape_nginx_value "${TIMEOUT_MAX}")";
              set \$cube_proxy_host_ip "$(escape_nginx_value "${NODE_IP}")";
              set \$cube_sidecar_addr "$(escape_nginx_value "${CUBE_SIDECAR_LISTEN_ADDR}")";
              EOF

              exec /usr/local/openresty/nginx/sbin/start.sh
          env:
            {{- include "cube.timezoneEnv" . | nindent 12 }}
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: REDIS_HOST
              value: {{ $redisHost | quote }}
            - name: REDIS_PORT
              value: {{ $redisPort | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cube.secretName" . }}
                  key: redis-password
            - name: REDIS_DB
              value: {{ .Values.cubeProxy.redis.db | quote }}
            - name: TIMEOUT_MIN
              value: {{ .Values.cubeProxy.timeout.min | quote }}
            - name: TIMEOUT_MAX
              value: {{ .Values.cubeProxy.timeout.max | quote }}
            - name: CUBE_SIDECAR_REDIS_ADDR
              value: {{ printf "%s:%v" $redisHost $redisPort | quote }}
            - name: CUBE_SIDECAR_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cube.secretName" . }}
                  key: redis-password
            - name: CUBE_SIDECAR_REDIS_DB
              value: {{ .Values.cubeProxy.redis.db | quote }}
            - name: CUBE_SIDECAR_CUBEMASTER_URL
              value: {{ printf "http://%s" (include "cube.masterEndpoint" .) | quote }}
            - name: CUBE_SIDECAR_PROXY_ADMIN_URLS
              value: {{ join "," .Values.cubeProxy.sidecar.proxyAdminURLs | quote }}
            - name: CUBE_SIDECAR_LISTEN_ADDR
              value: {{ .Values.cubeProxy.sidecar.listenAddr | quote }}
            - name: CUBE_SIDECAR_DEFAULT_IDLE_TIMEOUT
              value: {{ .Values.cubeProxy.sidecar.defaultIdleTimeout | quote }}
            - name: CUBE_SIDECAR_LAST_ACTIVE_POLL
              value: {{ .Values.cubeProxy.sidecar.lastActivePoll | quote }}
            - name: CUBE_SIDECAR_IDLE_SWEEP_INTERVAL
              value: {{ .Values.cubeProxy.sidecar.idleSweepInterval | quote }}
            - name: CUBE_SIDECAR_BOOTSTRAP_WARMUP
              value: {{ .Values.cubeProxy.sidecar.bootstrapWarmup | quote }}
            - name: CUBE_SIDECAR_STATE_LOCK_TTL
              value: {{ .Values.cubeProxy.sidecar.stateLockTTL | quote }}
            - name: CUBE_PROXY_HTTP_LISTEN_PORT
              value: {{ .Values.cubeProxy.ports.http.containerPort | quote }}
            - name: CUBE_PROXY_HTTPS_LISTEN_PORT
              value: {{ .Values.cubeProxy.ports.https.containerPort | quote }}
            - name: CUBE_PROXY_RESOLVER_ADDRS
              value: {{ join " " .Values.cubeProxy.resolver.addresses | quote }}
            - name: CUBE_PROXY_RESOLVER_VALID
              value: {{ .Values.cubeProxy.resolver.valid | quote }}
            - name: CUBE_PROXY_RESOLVER_TIMEOUT
              value: {{ .Values.cubeProxy.resolver.timeout | quote }}
            - name: CUBE_PROXY_RESOLVER_IPV6
              value: {{ ternary "on" "off" .Values.cubeProxy.resolver.ipv6 | quote }}
            {{- if .Values.cubeProxy.sidecar.adminToken }}
            - name: CUBE_SIDECAR_ADMIN_TOKEN
              value: {{ .Values.cubeProxy.sidecar.adminToken | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.cubeProxy.ports.http.containerPort }}
              {{- if .Values.cubeProxy.ports.http.hostPort }}
              hostPort: {{ .Values.cubeProxy.ports.http.hostPort }}
              {{- end }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.cubeProxy.ports.https.containerPort }}
              {{- if .Values.cubeProxy.ports.https.hostPort }}
              hostPort: {{ .Values.cubeProxy.ports.https.hostPort }}
              {{- end }}
              protocol: TCP
          {{- if .Values.cubeProxy.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - {{ printf "curl -fsS http://127.0.0.1:%v%s >/dev/null" .Values.cubeProxy.probes.readiness.port .Values.cubeProxy.probes.readiness.path | quote }}
            initialDelaySeconds: {{ .Values.cubeProxy.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.cubeProxy.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.cubeProxy.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.cubeProxy.probes.liveness.enabled }}
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - {{ printf "curl -fsS http://127.0.0.1:%v%s >/dev/null" .Values.cubeProxy.probes.liveness.port .Values.cubeProxy.probes.liveness.path | quote }}
            initialDelaySeconds: {{ .Values.cubeProxy.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.cubeProxy.probes.liveness.periodSeconds }}
            failureThreshold: {{ .Values.cubeProxy.probes.liveness.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: proxy-certs
              mountPath: /usr/local/openresty/nginx/certs
              readOnly: true
            - name: proxy-logs
              mountPath: /data/log/cube-proxy
          {{- with .Values.cubeProxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: proxy-certs
          secret:
            secretName: {{ $proxyCertSecretName }}
            items:
              - key: {{ .Values.cubeProxy.tls.certSecretKey | quote }}
                path: cube.app+3.pem
              - key: {{ .Values.cubeProxy.tls.keySecretKey | quote }}
                path: cube.app+3-key.pem
        - name: proxy-logs
          hostPath:
            path: {{ .Values.cubeProxy.logs.hostPath | quote }}
            type: DirectoryOrCreate
{{- end }}

# Default values for CubeSandbox on Kubernetes/TKE.
# This chart intentionally separates bootstrap images from runtime images.

nameOverride: ""
fullnameOverride: ""

global:
  timezone: Asia/Shanghai

images:
  # Init container 1: installs/configures PVM host kernel and may reboot the host.
  pvmHostBootstrap:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-pvm-host-bootstrap
    tag: v0.4.0
    pullPolicy: Always

  # Init container 2: validates KVM/XFS, prepares host directories, checks CubeMaster reachability.
  nodeInit:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-node-init
    tag: v0.4.0
    pullPolicy: Always

  # Runtime container for Cube compute nodes. It should contain node-only components.
  node:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-node
    tag: v0.4.0-cubevsfix-20260627
    pullPolicy: Always

  master:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-master
    tag: v0.4.0
    pullPolicy: Always

  api:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-api
    tag: v0.4.0
    pullPolicy: Always

  cubemastercli:
    repository: ccr.ccs.tencentyun.com/pavleli/cubemastercli
    tag: v0.4.0
    pullPolicy: Always

  proxyNode:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-proxy-node
    tag: v0.4.0
    pullPolicy: Always

  cubeEgress:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-egress
    tag: v0.4.0
    pullPolicy: Always

  cubeEgressNet:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-egress-net
    tag: v0.4.0
    pullPolicy: Always

  webui:
    repository: ccr.ccs.tencentyun.com/pavleli/cube-webui
    tag: v0.4.0
    pullPolicy: Always

  coredns:
    repository: ccr.ccs.tencentyun.com/tkeimages/coredns
    tag: v1.11.1-tke.1
    pullPolicy: IfNotPresent

  templateBuilder:
    repository: docker
    tag: "27-dind"
    pullPolicy: IfNotPresent

imagePullSecrets: []

storageClass:
  create: true
  name: cube-cbs-wffc
  provisioner: com.tencent.cloud.csi.cbs
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  parameters:
    type: cbs

placement:
  # Control-plane components run only on dedicated control nodes.
  controlPlane:
    nodeSelector:
      cube.tencent.com/role: control
      cube.tencent.com/cube-control: "true"
    tolerations:
      - key: cube.tencent.com/control
        operator: Equal
        value: "true"
        effect: NoSchedule

  # Compute placement is used by cube-node and node-local data-plane components
  # including cube-proxy-node and cube-dns.
  compute:
    nodeSelector:
      cube.tencent.com/role: compute
      cube.tencent.com/cube-node: "true"
      cube.tencent.com/allow-pvm-bootstrap: "true"
    affinity: {}
    tolerations:
      - key: cube.tencent.com/compute
        operator: Equal
        value: "true"
        effect: NoSchedule

externalControlPlane:
  # Compute-only mode equivalent to one-click ONE_CLICK_DEPLOY_ROLE=compute.
  # When enabled, Cube Node and CubeAPI use the supplied CubeMaster endpoint
  # instead of the chart-managed CubeMaster Service.
  enabled: false
  masterEndpoint: ""
  apiEndpoint: ""

controlPlane:
  enabled: true
  namespaceScoped: true

  master:
    enabled: true
    replicas: 1
    command: []
    args: []
    env: []
    nodeIPs: []
    service:
      type: ClusterIP
      port: 8089
    persistence:
      # One-click persists CubeMaster artifacts under /data/CubeMaster/storage.
      # Kubernetes multi-control-node deployments use PVC by default so data
      # follows the Pod when it is rescheduled across control nodes.
      enabled: true
      hostPath: ""
      existingClaim: ""
      storageClassName: cube-cbs-wffc
      size: 20Gi
      accessModes:
        - ReadWriteOnce
    probes:
      readiness:
        enabled: true
        path: /notify/health
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 12
      liveness:
        enabled: true
        path: /notify/health
        initialDelaySeconds: 30
        periodSeconds: 20
        failureThreshold: 6
    resources: {}

  api:
    enabled: true
    replicas: 1
    command: []
    args: []
    env: []
    bind: "0.0.0.0:3000"
    sandboxDomain: "cube.app"
    service:
      type: ClusterIP
      port: 3000
    internalLoadBalancer:
      enabled: false
      annotations: {}
      port: 3000
    probes:
      readiness:
        enabled: true
        path: /health
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 12
      liveness:
        enabled: true
        path: /health
        initialDelaySeconds: 30
        periodSeconds: 20
        failureThreshold: 6
    resources: {}

  templateBuilder:
    # Optional sidecar in cube-master Pod. Enable only when template build is required.
    enabled: false
    privileged: true
    dockerdArgs: []
    resources: {}

cubemastercli:
  # Operational CLI Pod delivered with the chart. It contains the real
  # CubeMaster/cmd/cubemastercli binary only. The chart injects
  # CUBEMASTERCLI_ADDRESS and CUBEMASTERCLI_PORT for convenience; commands
  # still execute the upstream cubemastercli binary with explicit flags.
  enabled: true
  replicas: 1
  podAnnotations: {}
  command: []
  args: []
  env: []
  probes:
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 12
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 20
      failureThreshold: 6
  resources: {}

webui:
  # One-click enables WebUI by default on host port 12088. In Kubernetes the
  # chart delivers it as a Service on port 12088 and proxies /cubeapi to CubeAPI.
  enabled: true
  replicas: 1
  podAnnotations: {}
  service:
    type: ClusterIP
    port: 12088
    targetPort: 80
    annotations: {}
  # Empty upstream uses the chart-managed CubeAPI Service.
  upstream: ""
  resources: {}

cubeDns:
  # One-click deploys CoreDNS for cube.app / wildcard resolution and lets the
  # compute runtime resolve through a local DNS address. The default Kubernetes
  # mode runs CoreDNS on Cube compute nodes and lets cube-node Pods use
  # 127.0.0.54 explicitly via dnsConfig, without modifying host /etc/resolv.conf.
  enabled: true
  # nodeLocal: DaemonSet on Cube nodes, binds bindAddress and returns hostIP by default.
  # service:   Deployment + ClusterIP Service for DNS itself. Requires
  #            answerIP for cube.app records because CubeProxy is node-local.
  mode: nodeLocal
  replicas: 1
  bindAddress: 127.0.0.54
  sandboxGateway:
    # Also bind node-local cube-dns on the compute node HostIP so Cube sandbox
    # guests can use it as their nameserver. The regular cube-node Pod DNS
    # keeps using bindAddress.
    enabled: true
  domain: cube.app
  # Empty answerIP in nodeLocal mode returns the local node hostIP, matching
  # one-click CUBE_PROXY_DNS_ANSWER_IP="${CUBE_SANDBOX_NODE_IP:-}".
  # service mode requires answerIP because CubeProxy is not exposed by Service.
  answerIP: ""
  forward:
    # Empty upstreams forwards to /etc/resolv.conf. Set explicit upstreams to
    # avoid forwarding loops in custom clusters.
    upstreams: []
  service:
    type: ClusterIP
    port: 53
    annotations: {}
  resources: {}

diagnostics:
  # One-click ships cube-diag scripts. In Kubernetes the chart exposes an
  # equivalent kubectl-based diagnostic script through a ConfigMap so operators
  # can collect release state without maintaining a second script copy.
  enabled: true

mysql:
  enabled: true
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  # Empty host installs and uses the chart-managed cube-mysql service.
  # Non-empty host uses the configured third-party MySQL service and skips cube-mysql.
  host: ""
  port: 3306
  database: cube_mvp
  user: cube
  password: cube_pass
  rootPassword: cube_root
  persistence:
    enabled: true
    existingClaim: ""
    hostPath: ""
    size: 20Gi
    storageClassName: cube-cbs-wffc
    accessModes:
      - ReadWriteOnce
  resources: {}

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  # Empty host installs and uses the chart-managed cube-redis service.
  # Non-empty host uses the configured third-party Redis service and skips cube-redis.
  host: ""
  port: 6379
  password: ceuhvu123
  persistence:
    enabled: true
    existingClaim: ""
    hostPath: ""
    size: 10Gi
    storageClassName: cube-cbs-wffc
    accessModes:
      - ReadWriteOnce
  resources: {}

cubeNode:
  enabled: true
  podAnnotations: {}
  updateStrategy:
    type: RollingUpdate

  # How CUBE_SANDBOX_NODE_IP is populated. Currently statusHostIP or static are supported.
  ipSource: statusHostIP
  staticNodeIP: ""

  # Default to the PVM profile so a labelled compute node can be initialized by
  # this chart without an extra values file. cube-node-init fails fast if this
  # value does not match host kvm_pvm state.
  pvmGuestKernel:
    enabled: true

  network:
    # One-click auto-detects the primary NIC and patches Cubelet eth_name.
    autoDetectEthName: true
    # Leave empty to keep auto-detection. Set to pin Cubelet eth_name.
    ethName: ""
    # Leave empty to use packaged Cubelet config.toml CIDR. Set to patch cidr.
    cidr: ""
    cidrSkipConflictCheck: false

  dns:
    useCubeDns: true
    nameserver: 127.0.0.54
    clusterDomain: cluster.local
    sandbox:
      # DNS injected into Cube sandbox guest /etc/resolv.conf. When useCubeDns
      # is true and nameservers is empty, the chart injects the current compute
      # node HostIP so guests use the node-local cube-dns sandboxGateway. When
      # dedicated sandboxServiceProxy DNS is enabled, dedicated.answerIPs are
      # injected instead.
      useCubeDns: true
      nameservers: []
    waitTimeoutSeconds: 120
    checkImage:
      repository: busybox
      tag: "1.36"
      pullPolicy: IfNotPresent

  # Optional node-local HTTP proxies for Kubernetes Services that must be
  # reachable from Cube sandbox guests. CubeVS eBPF egress bypasses host
  # kube-proxy ClusterIP DNAT, so the guest should resolve these names to the
  # compute node HostIP, or to dedicated.answerIPs in dedicated mode, and let a
  # hostNetwork proxy connect from node network to Service.
  sandboxServiceProxies:
    []
    # - name: agent-way-model-gateway
    #   listenPort: 4000
    #   upstreamHost: agent-way-model-gateway.agent-infra.svc.cluster.local
    #   upstreamPort: 4000
    #   # Set this to kube-dns ClusterIP when dnsNames override upstreamHost.
    #   upstreamResolver: ""
    #   upstreamHostHeader: agent-way-model-gateway.agent-infra.svc.cluster.local
    #   # Optional per-service DNS answers. Empty uses dedicated.answerIPs when
    #   # set, otherwise the current compute node HostIP.
    #   answerIPs: []
    #   dnsNames:
    #     - agent-way-model-gateway.agent-infra
    #     - agent-way-model-gateway.agent-infra.svc.cluster.local

  sandboxServiceProxy:
    dedicated:
      # Run a hostNetwork proxy on a fixed non-compute or non-owner node. Use
      # this when returning the local compute HostIP would hairpin through
      # CubeVS and time out.
      enabled: false
      replicas: 1
      nodeName: ""
      nodeSelector: {}
      tolerations: []
      answerIPs: []
      dns:
        enabled: true

  env: []
  resources: {}

  probes:
    startup:
      enabled: true
      tcpSocketPort: 9999
      periodSeconds: 10
      failureThreshold: 30
    readiness:
      enabled: true
      tcpSocketPort: 9999
      initialDelaySeconds: 10
      periodSeconds: 10
      failureThreshold: 6
    liveness:
      enabled: true
      tcpSocketPort: 9999
      initialDelaySeconds: 60
      periodSeconds: 20
      failureThreshold: 6

cubeProxy:
  # Cube data-plane proxy. When enabled, it is delivered and removed by this
  # chart together with the rest of CubeSandbox.
  #
  # One-click enables CubeProxy by default. This chart follows that behavior
  # and creates a self-signed test certificate unless production TLS is provided.
  enabled: true
  # Public sandbox domain returned by CubeAPI and terminated by CubeProxy.
  # For production, configure DNS for this domain and wildcard subdomains to
  # the CubeProxy entrypoint, for example *.sandbox.example.com.
  domain: cube.app
  podAnnotations: {}
  updateStrategy:
    type: RollingUpdate
  # One-click CubeProxy runs on the host network and must be able to reach the
  # local sandbox bridge IPs directly. Keep this enabled for functional
  # parity with node-local cube-dns.
  hostNetwork: true
  ports:
    http:
      containerPort: 80
      hostPort: ""
    https:
      containerPort: 443
      hostPort: ""
  redis:
    # Empty host uses redis.host or chart-managed cube-redis.
    host: ""
    port: ""
    db: 0
  timeout:
    min: 500
    max: 700
  tls:
    # CubeProxy nginx.conf expects these file names inside the container:
    #   /usr/local/openresty/nginx/certs/cube.app+3.pem
    #   /usr/local/openresty/nginx/certs/cube.app+3-key.pem
    #
    # Supported modes:
    #   existingSecret - production. The operator provides a TLS Secret.
    #   certManager    - chart creates a cert-manager.io/v1 Certificate.
    #   selfSigned     - chart creates a self-signed certificate Secret; test only.
    #   inline         - chart creates a Secret from tls.cert/tls.key values.
    mode: selfSigned
    # Optional for certManager/selfSigned/inline. Defaults to <release>-proxy-certs.
    secretName: ""
    existingSecret: ""
    certSecretKey: tls.crt
    keySecretKey: tls.key
    caSecretKey: ca.crt
    certManager:
      issuerRef:
        group: cert-manager.io
        kind: ClusterIssuer
        name: ""
      commonName: ""
      dnsNames: []
      ipAddresses: []
      duration: ""
      renewBefore: ""
      usages:
        - digital signature
        - key encipherment
        - server auth
    selfSigned:
      commonName: ""
      dnsNames:
        - cube.app
        - "*.cube.app"
        - localhost
      ipAddresses:
        - 127.0.0.1
      caValidityDays: 3650
      certValidityDays: 3650
    # Used only when tls.mode=inline.
    cert: ""
    key: ""
  sidecar:
    # CubeProxy image starts cube-proxy-sidecar from CubeProxy/Dockerfile.
    # These values wire it to Kubernetes Services instead of the one-click
    # loopback defaults.
    listenAddr: 127.0.0.1:8083
    proxyAdminURLs:
      - http://127.0.0.1:8082
    defaultIdleTimeout: 5m
    lastActivePoll: 5s
    idleSweepInterval: 5s
    bootstrapWarmup: 30s
    stateLockTTL: 60s
    # Leave empty until CubeProxy nginx admin server also has token injection.
    adminToken: ""
  resolver:
    # CubeProxy nginx Lua Redis client needs an nginx resolver when Redis is
    # configured by DNS name (the default Kubernetes Service DNS name).
    # Empty addresses auto-discovers nameservers from the Pod /etc/resolv.conf.
    addresses: []
    valid: 30s
    timeout: 5s
    ipv6: false
  probes:
    readiness:
      enabled: true
      path: /admin/healthz
      port: 8082
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 6
    liveness:
      enabled: true
      path: /admin/healthz
      port: 8082
      initialDelaySeconds: 30
      periodSeconds: 20
      failureThreshold: 6
  logs:
    hostPath: /data/log/cube-proxy
  resources: {}

cubeEgress:
  # Transparent outbound egress/MITM data-plane component. When enabled, the
  # Cube Node Big Pod gets a cube-egress sidecar and a cube-egress-net helper
  # sidecar that owns host TPROXY iptables/ip-rule state.
  enabled: true
  bootstrapURL: http://127.0.0.1:19090/v1/policies/dump
  debugDump: false
  ca:
    # Supported modes:
    #   selfSigned     - chart creates/reuses a release-scoped CA Secret.
    #   existingSecret - operator provides cube-root-ca.* and placeholder.*.
    #   inline         - chart creates a Secret from the inline PEM values.
    mode: selfSigned
    secretName: ""
    existingSecret: ""
    rootCertKey: cube-root-ca.crt
    rootKeyKey: cube-root-ca.key
    placeholderCertKey: placeholder.crt
    placeholderKeyKey: placeholder.key
    selfSigned:
      caCommonName: CubeSandbox Egress MITM CA
      placeholderCommonName: cube-proxy-placeholder
      caValidityDays: 3650
      placeholderValidityDays: 36500
    inline:
      rootCert: ""
      rootKey: ""
      placeholderCert: ""
      placeholderKey: ""
  network:
    enabled: true
    ingressInterface: cube-dev
    tproxyOnIP: 192.168.0.1
    initialWaitSeconds: 300
    reapplyIntervalSeconds: 30
    probes:
      readiness:
        enabled: true
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 30
      liveness:
        enabled: true
        initialDelaySeconds: 330
        periodSeconds: 20
        failureThreshold: 6
  probes:
    readiness:
      enabled: true
      path: /admin/v1/health
      port: 9090
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 12
    liveness:
      enabled: true
      path: /admin/v1/health
      port: 9090
      initialDelaySeconds: 30
      periodSeconds: 20
      failureThreshold: 6
  resources: {}
  netResources: {}

bootstrap:
  pvmHostKernel:
    enabled: true
    desiredKernelPattern: pvm.host
    bootArgs: "nopti pti=off"
    package:
      # image: rpm/deb is baked into cube-pvm-host-bootstrap image under /artifacts.
      # production delivery should use image and normal registry pulls.
      source: image
      rpmPath: /artifacts/kernel-pvm-host.rpm
      debPath: /artifacts/linux-image-pvm-host.deb
      rpmUrl: ""
      debUrl: ""
      sha256: ""
    reboot:
      enabled: true
      coordinated: true
      leaseName: cube-node-pvm-bootstrap
      leaseTTLSeconds: 900
      maxConcurrent: 1
      maxCount: 1

  nodeInit:
    enabled: true
    requireKVM: true
    requireXFS: true
    chmodKVM: true
    loadKVMModule: true
    writeUdevRule: true
    createHostDirs: true
    checkMasterConnectivity: true
    checkMemory: true
    minMemoryKB: "7500000"
    checkCgroupCPU: true
    checkGlibc: true
    checkCIDR: true
    checkCubecowDeps: true
    dataCubelet:
      path: /data/cubelet
      loopback:
        enabled: true
        imagePath: /data/cubelet-xfs.img
        size: 25G

security:
  hostNetwork: true
  hostPID: true
  privileged: true

hostPaths:
  root: /
  dev: /dev
  sys: /sys
  libModules: /lib/modules
  dataCubelet: /data/cubelet
  dataLog: /data/log
  dataCubeShim: /data/cube-shim
  dataSnapshotPack: /data/snapshot_pack
  tmpCube: /tmp/cube

serviceAccount:
  create: true
  annotations: {}

rbac:
  create: true

helmTest:
  enabled: true
  image:
    repository: curlimages/curl
    tag: "8.10.1"
    pullPolicy: IfNotPresent
  dnsImage:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
